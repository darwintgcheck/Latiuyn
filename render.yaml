services:
  - type: web
    name: birloto-pro
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: AUTO_MIGRATE
        value: true
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DEMO_TOPUP_AMOUNT
        value: 25
